<!DOCTYPE html>
<html>
<head><title>X-Ray</title></head>
<body>
<div data-role="page" id="XRayOverlayInjector">
<script type="text/javascript">
(function () {
  // Fetch plugin config then conditionally inject the overlay script
  fetch('/XRay/client-config')
    .then(function (r) { return r.json(); })
    .then(function (cfg) {
      if (cfg.overlayEnabled === false) return;
      window._xrayMaxActors = cfg.maxActors || 4;
      var s = document.createElement('script');
      s.src = '/XRay/overlay.js';
      document.head.appendChild(s);
    })
    .catch(function () {
      // Fallback: inject unconditionally if config endpoint fails
      var s = document.createElement('script');
      s.src = '/XRay/overlay.js';
      document.head.appendChild(s);
    });
})();
</script>
</div>
</body>
</html>
