<!DOCTYPE html>
<html>
<head><title>X-Ray</title></head>
<body>
<div data-role="page" id="XRayOverlayInjector">
<script type="text/javascript">
(function () {
  function loadScript(onDone) {
    var s = document.createElement('script');
    s.src = '/XRay/overlay.js';
    s.onload = onDone;
    s.onerror = onDone;
    document.head.appendChild(s);
  }

  function goHome() {
    setTimeout(function () { Emby.Page.navigate('index.html'); }, 200);
  }

  function inject() {
    if (window.__xrayLoaded) {
      goHome();
      return;
    }

    fetch('/XRay/client-config')
      .then(function (r) { return r.json(); })
      .then(function (cfg) {
        window._xrayMaxActors = cfg.MaxActors || 4;
        if (cfg.OverlayEnabled === false) {
          localStorage.removeItem('xray_overlay');
          goHome();
          return;
        }
        localStorage.setItem('xray_overlay', '1');
        loadScript(goHome);
      })
      .catch(function () {
        // If config fetch fails, try to load anyway
        loadScript(goHome);
      });
  }

  document.querySelector('#XRayOverlayInjector').addEventListener('pageshow', inject);
})();
</script>
</div>
</body>
</html>
