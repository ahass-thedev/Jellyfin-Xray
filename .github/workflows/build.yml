name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0.1"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version ${VERSION}"

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.XRay/Jellyfin.Plugin.XRay.csproj

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.XRay/Jellyfin.Plugin.XRay.csproj \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.version }}

      - name: Publish
        run: |
          dotnet publish Jellyfin.Plugin.XRay/Jellyfin.Plugin.XRay.csproj \
            --configuration Release \
            --no-build \
            --output ./publish

      - name: Package zip
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ZIPNAME="jellyfin-plugin-xray_${VERSION}.zip"

          mkdir -p dist
          zip -j "dist/${ZIPNAME}" publish/*.dll
          echo "zip_name=${ZIPNAME}" >> $GITHUB_ENV

          CHECKSUM=$(md5sum "dist/${ZIPNAME}" | awk '{ print $1 }')
          echo "checksum=${CHECKSUM}" >> $GITHUB_ENV
          echo "Checksum: ${CHECKSUM}"

      - name: Update manifest.json
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REPO="${{ github.repository }}"
          SOURCE_URL="https://github.com/${REPO}/releases/download/v${VERSION}/jellyfin-plugin-xray_${VERSION}.zip"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CHECKSUM="${{ env.checksum }}"

          jq --arg version "${VERSION}" \
             --arg url "${SOURCE_URL}" \
             --arg checksum "${CHECKSUM}" \
             --arg ts "${TIMESTAMP}" \
             '.[0].versions[0] = {
               version: $version,
               changelog: "See release notes.",
               targetAbi: "10.11.0.0",
               sourceUrl: $url,
               checksum: $checksum,
               timestamp: $ts
             }' manifest.json > manifest.tmp.json

          mv manifest.tmp.json manifest.json
          cp manifest.json /tmp/manifest_updated.json
          echo "Updated manifest.json:"
          cat manifest.json

      - name: Checkout main for manifest commit
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated manifest
        run: |
          cp /tmp/manifest_updated.json manifest.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifest for v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.zip_name }}
          body: |
            ## X-Ray Plugin v${{ steps.version.outputs.version }}

            ### Installation
            1. In Jellyfin Dashboard → Plugins → Repositories → Add
            2. Add this URL:
               ```
               https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
               ```
            3. Go to Catalogue → X-Ray → Install

            ### Sidecar setup (required)
            The plugin requires the Python face recognition sidecar.
            See README.md for setup instructions.

  build-sidecar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jellyfin-xray-sidecar
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push sidecar image
        uses: docker/build-push-action@v5
        with:
          context: ./sidecar
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
